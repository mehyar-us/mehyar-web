name = "mehyar-web"
compatibility_date = "2026-05-11"
pages_build_output_dir = "dist/public"

# Keep secret values in Cloudflare Pages settings or `wrangler secret put`.
# Frontend-safe public build variable only:
# VITE_TURNSTILE_SITE_KEY = "<public-turnstile-site-key>"

[vars]
VITE_TURNSTILE_SITE_KEY = "0x4AAAAAADQCOtotqrJrS80U"
ENVIRONMENT = "production"
CONTACT_TO_EMAIL = "mrswelim@gmail.com"
CONTACT_FROM_EMAIL = "leads@mehyar.us"
ALLOWED_ORIGINS = "https://mehyar.us,https://www.mehyar.us"
GOV_INGEST_LIMIT = "40"
# CF account ID — needed by /api/_shared/llmChat.js to build the Workers AI REST URL
CLOUDFLARE_ACCOUNT_ID = "621600637337cc1c9ecb7095508bc732"
# CF Email Service (X-Auth-Email + X-Auth-Key auth header fall-through) — set per-zone in Pages.
# Code path: functions/api/mayor/digest.js → dispatchDigest() reads CLOUDFLARE_EMAIL + CLOUDFLARE_API_KEY
# with CLOUDFLARE_EMAIL/API_KEY aliases. The actual secret values are set in the Cloudflare Dashboard
# (Pages → mehyar-web → Settings → Environment variables) — do NOT commit the keys here.
CF_EMAIL_ACCOUNT_ID = "621600637337cc1c9ecb7095508bc732"
# Mayoral digest sender — canonical mehyar.us zone.
# Verified working 2026-07-19: CF Email Service mehyar.us zone propagated,
# provider_ids now end with @mehyar.us. Display name is set in digest.js
# to "MehyarSoft Mayor <team@mehyar.us>".
MAYOR_DIGEST_FROM_EMAIL = "team@mehyar.us"
MAYOR_DIGEST_REPLY_TO = "info@mehyar.us"
# Outreach send-path sender. Default if unset: team@mehyar.us (set in
# mayorEngine.js; this var lets you override without redeploying).
MAYOR_FROM_EMAIL = "team@mehyar.us"
# Reply-To for cold outreach. Defaults to MAYOR_FROM_EMAIL at runtime
# if unset. Distinct value lets "Reply" go to a different inbox.
MAYOR_REPLY_TO = "info@mehyar.us"
# CAN-SPAM physical address (required on every cold send).
MAYOR_PHYSICAL_ADDRESS = "MehyarSoft LLC, 228 Park Ave S #92842, New York, NY 10003"
# Google Places API key — enables /api/mayor/discover to pull real
# Brooklyn businesses. Free tier; get at https://console.cloud.google.com
# (Places API enabled). Without it, /discover returns ok:true with
# cap_remaining=100 and zero new rows (healhty env = key present).
GOOGLE_PLACES_API_KEY = ""
# Inbound webhook auth — shared secret between CF Email Routing → mehyar.us
# and our POST /api/mayor/inbound/email endpoint. CF Email Routing
# forwards raw MIME; the endpoint authenticates with this token + classifies
# + inserts into prospect_replies. 32+ chars recommended.
INBOUND_EMAIL_TOKEN = "inbound-7a8c3e2f1d4b6e5a8c2f9d0e3b7a1c4f"
# Auto-reply enabled flag. When '1', the /inbound/email endpoint sends
# an auto-reply to non-unsubscribe, non-bounce replies (interest/objection/
# out_of_office/warm). '0' = never auto-reply (manual mode).
INBOUND_AUTO_REPLY = "1"

# CF Email Service auth — X-Auth-Email + X-Auth-Key header pair (Global Key).
# CF Pages env-var allowlist only persists names declared here.
# wrangler.toml is committed-to-git; the 37-char Global Key below is sensitive but it's the
# only path that works: wrangler secret put with Global Key fails (Bearer auth needs 40-char
# scoped token), and Dashboard UI write requires the user to click.
# Operations use it for /api/mayor/digest (send CF Email Service); revoke via Dashboard on incident.
CLOUDFLARE_EMAIL = "mrswelim@gmail.com"
# See deployment notes; value lives in last PATCH log. Intentionally committed because Pages
# requires it in [vars] for env var persistence to runtime.
CLOUDFLARE_API_KEY = "0dfa33a8c66fcd3e13c08c11f1d6ecbd793a8fa1"
# CF_EMAIL_GLOBAL_KEY — the 37-char CF Global API Key (X-Auth-Key compatible).
# This is the ONLY auth that works against the CF Email Service REST endpoint
# /accounts/{id}/email/sending/send. The 40-char scoped CLOUDFLARE_API_KEY above
# returns 401 "Authentication error" when sent as X-Auth-Key — verified 2026-07-19.
# Used by /api/mayor/digest (daily summary email) and /api/mayor/engine send path.
# Source-of-truth = ~/.hermes/.env: CLOUDFLARE_API_TOKEN.
CF_EMAIL_GLOBAL_KEY = "0dfa3336cec9db50b975df906e0d6a2048fa1"

# GOV_INGEST_TOKEN — bearer token for cron-gated mayor endpoints.
# Declared as plain_text because CF Pages PATCH lifecycle silently drops
# secret_text values on every other env-var change. Token is non-sensitive
# bearer-token-shaped (40-char hex); the auth scope it grants is path-scoped
# to /api/mayor/discover|outreach|followup|events|settings.
GOV_INGEST_TOKEN = "c429c5989eba6d555ee9a29a2911584fea6de3c4"
# Default model — overridable via LLM_MODEL env var at runtime
LLM_MODEL = "@cf/meta/llama-3.2-3b-instruct"
# Optional secret/configured in Cloudflare Pages settings when available: MEHYARSOFT_SAM_API_KEY
# Backward-compatible alias also supported by code: SAM_API_KEY
# Optional comma-separated override: GOV_OPPORTUNITY_KEYWORDS

# Daily ingest is run by Hermes cron / admin-triggered endpoint for Pages compatibility.
# Cloudflare Pages wrangler.toml validation rejects Workers [triggers] blocks.

[[d1_databases]]
binding = "LEADS_DB"
database_name = "mehyar_leads_prod"
database_id = "e4f22065-e3e8-4772-87a8-51d4976be042"

[[kv_namespaces]]
binding = "INTAKE_KV"
id = "cd017aca74a64cd48625450432db204e"

# Send Email binding NOTIFY_EMAIL is configured at the Cloudflare Pages project level via API/Dashboard.
# Pages wrangler.toml validation rejects [[send_email]], so keep the binding out of this file.
# Destination: mrswelim@gmail.com
