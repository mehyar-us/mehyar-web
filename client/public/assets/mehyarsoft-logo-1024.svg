<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="ms1024-title ms1024-desc">
  <title id="ms1024-title">MehyarSoft</title>
  <desc id="ms1024-desc">MehyarSoft LLC founder-led software, systems, and AI consulting logo. Stylized M-S letterform with a circuit-node motif on a deep-teal rounded badge, paired with the MehyarSoft wordmark and the tagline SOFTWARE • SYSTEMS • AI. 1024 by 1024.</desc>

  <defs>
    <!-- Brand gradients: deep teal to cyan, consistent with --brand-700 / --accent. -->
    <linearGradient id="ms-mark-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#062f42" />
      <stop offset="0.55" stop-color="#0b5268" />
      <stop offset="1" stop-color="#28b1c5" />
    </linearGradient>
    <linearGradient id="ms-mark-stroke" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#28b1c5" />
      <stop offset="1" stop-color="#7dd0db" />
    </linearGradient>
    <linearGradient id="ms-wordmark-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#062f42" />
      <stop offset="0.6" stop-color="#083f54" />
      <stop offset="1" stop-color="#0b5268" />
    </linearGradient>
    <linearGradient id="ms-bg-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#e6f3f6" />
    </linearGradient>
  </defs>

  <!-- Soft square background so the SVG stands alone when opened in a new tab. -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="url(#ms-bg-soft)" />

  <!-- Icon badge: rounded square containing the M-S letterform. -->
  <g transform="translate(96 96)">
    <rect width="420" height="420" rx="96" ry="96" fill="url(#ms-mark-fill)" />
    <rect x="6" y="6" width="408" height="408" rx="92" ry="92"
          fill="none" stroke="url(#ms-mark-stroke)" stroke-width="3" opacity="0.7" />

    <!-- Stylized M (Mehyar) — two peaks with a circuit-node spine. -->
    <path d="M 96 332 L 96 88 L 116 88 L 210 232 L 304 88 L 324 88 L 324 332 L 290 332 L 290 168 L 224 254 L 196 254 L 130 168 L 130 332 Z"
          fill="#ffffff" />
    <!-- Circuit motif — three nodes + thin connectors. Reads as systems integration. -->
    <circle cx="210" cy="160" r="11" fill="#28b1c5" />
    <circle cx="156" cy="208" r="7" fill="#7dd0db" />
    <circle cx="264" cy="208" r="7" fill="#7dd0db" />
    <line x1="156" y1="208" x2="210" y2="160" stroke="#7dd0db" stroke-width="3" />
    <line x1="264" y1="208" x2="210" y2="160" stroke="#7dd0db" stroke-width="3" />

    <!-- Subtle AI dot grid in the bottom-right of the badge. -->
    <g fill="#7dd0db" opacity="0.55">
      <circle cx="350" cy="380" r="4" />
      <circle cx="368" cy="380" r="4" />
      <circle cx="386" cy="380" r="4" />
      <circle cx="350" cy="362" r="4" />
      <circle cx="368" cy="362" r="4" />
      <circle cx="386" cy="362" r="4" />
      <circle cx="350" cy="344" r="4" />
      <circle cx="368" cy="344" r="4" />
      <circle cx="386" cy="344" r="4" />
    </g>
  </g>

  <!-- Wordmark to the right of the badge. -->
  <g transform="translate(560 96)">
    <text x="0" y="220" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif"
          font-size="160" font-weight="760" letter-spacing="-7" fill="url(#ms-wordmark-light)">Mehyar</text>
    <text x="0" y="370" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif"
          font-size="160" font-weight="420" letter-spacing="-8" fill="url(#ms-wordmark-light)">Soft</text>
    <line x1="0" y1="408" x2="430" y2="408" stroke="#28b1c5" stroke-width="3" />
    <text x="0" y="448" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif"
          font-size="28" font-weight="650" letter-spacing="6" fill="#46616b">SOFTWARE • SYSTEMS • AI</text>
  </g>

  <!-- Footer credit / LLC tag. -->
  <text x="512" y="952" text-anchor="middle"
        font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif"
        font-size="22" font-weight="500" letter-spacing="3" fill="#46616b" opacity="0.8">MehyarSoft LLC · Brooklyn, NY</text>
</svg>
