<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" width="760" height="180" role="img" aria-labelledby="title desc">
  <title id="title">MehyarSoft logo</title>
  <desc id="desc">MehyarSoft robot mark with a clean founder-led software consulting wordmark.</desc>
  <defs>
    <linearGradient id="mehyarsoft-wordmark-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#062f42" />
      <stop offset="0.54" stop-color="#083f54" />
      <stop offset="1" stop-color="#0b5268" />
    </linearGradient>
  </defs>
  <image href="/assets/mehyarsoft-mark.png" x="0" y="14" width="152" height="152" preserveAspectRatio="xMidYMid meet" />
  <g fill="url(#mehyarsoft-wordmark-light)">
    <text x="176" y="107" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="76" font-weight="760" letter-spacing="-3.4">Mehyar</text>
    <text x="448" y="107" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="76" font-weight="420" letter-spacing="-3.9">Soft</text>
  </g>
  <text x="181" y="139" fill="#46616b" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="650" letter-spacing="3.4">SOFTWARE • SYSTEMS • AI</text>
</svg>
