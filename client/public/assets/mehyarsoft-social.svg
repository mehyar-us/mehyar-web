<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="social-title social-desc">
  <title id="social-title">MehyarSoft LLC social card</title>
  <desc id="social-desc">MehyarSoft founder-led software, systems, and AI automation consulting social preview with the MehyarSoft logo mark and wordmark.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfc" />
      <stop offset="0.58" stop-color="#eaf4f7" />
      <stop offset="1" stop-color="#d7eef3" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#8fd9eb" stop-opacity="0.55" />
      <stop offset="1" stop-color="#8fd9eb" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="social-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#062f42" />
      <stop offset="0.55" stop-color="#0b5268" />
      <stop offset="1" stop-color="#28b1c5" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="958" cy="132" r="260" fill="url(#glow)" />
  <circle cx="102" cy="548" r="220" fill="#083f54" opacity="0.07" />

  <!-- Inline mark, no PNG dependency. -->
  <g transform="translate(78 80)">
    <rect width="178" height="178" rx="42" fill="url(#social-mark)" />
    <path d="M 41 142 L 41 38 L 49 38 L 89 99 L 129 38 L 137 38 L 137 142 L 124 142 L 124 75 L 95 108 L 83 108 L 54 75 L 54 142 Z"
          fill="#ffffff" />
    <circle cx="89" cy="69" r="4.5" fill="#28b1c5" />
    <circle cx="65" cy="89" r="3" fill="#7dd0db" />
    <circle cx="113" cy="89" r="3" fill="#7dd0db" />
    <line x1="65" y1="89" x2="89" y2="69" stroke="#7dd0db" stroke-width="1.4" />
    <line x1="113" y1="89" x2="89" y2="69" stroke="#7dd0db" stroke-width="1.4" />
  </g>

  <text x="282" y="158" fill="#083f54" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="72" font-weight="780" letter-spacing="-3.8">Mehyar</text>
  <text x="538" y="158" fill="#083f54" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="72" font-weight="430" letter-spacing="-3.8">Soft</text>
  <text x="286" y="205" fill="#46616b" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="680" letter-spacing="3.7">SOFTWARE • SYSTEMS • AI</text>
  <text x="80" y="355" fill="#071116" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="58" font-weight="760" letter-spacing="-2.6">Stop losing customers to</text>
  <text x="80" y="425" fill="#083f54" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="58" font-weight="760" letter-spacing="-2.6">bad follow-up and broken systems.</text>
  <text x="82" y="503" fill="#314b55" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="480">Founder-led consulting for websites, booking, automation, and AI workflows.</text>
  <rect x="80" y="548" width="220" height="44" rx="22" fill="#083f54" />
  <text x="112" y="577" fill="#ffffff" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="740" letter-spacing="0.6">mehyar.us</text>
