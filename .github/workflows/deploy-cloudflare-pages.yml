name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
      - 'functions/**'
      - 'migrations/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'wrangler.toml'
      - '.github/workflows/deploy-cloudflare-pages.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
      CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Verify deploy-time configuration
        run: |
          test -n "$VITE_TURNSTILE_SITE_KEY" || { echo "VITE_TURNSTILE_SITE_KEY is missing"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "CLOUDFLARE_ACCOUNT_ID is missing"; exit 1; }
          test -n "$CLOUDFLARE_EMAIL" || { echo "CLOUDFLARE_EMAIL is missing"; exit 1; }
          test -n "$CLOUDFLARE_API_KEY" || { echo "CLOUDFLARE_API_KEY is missing"; exit 1; }
      - run: npm ci --include=dev
      - run: npm run check
      - run: npm run test:intake
      - run: CUSTOM_DOMAIN=true NODE_ENV=production npm run build:client
      - name: Verify Turnstile site key was compiled into the client bundle
        run: |
          if grep -R "Preparing secure verification" dist/public/assets/*.js >/dev/null; then
            echo "Runtime Turnstile fallback path exists in bundle. Checking compiled key and runtime endpoint separately."
          fi
          grep -R "$VITE_TURNSTILE_SITE_KEY" dist/public/assets/*.js >/dev/null || { echo "Turnstile site key was not compiled into the client bundle"; exit 1; }
          grep -R "/api/client-config" dist/public/assets/*.js >/dev/null || { echo "Runtime client config endpoint path is missing from the client bundle"; exit 1; }
          test -f functions/api/client-config.js || { echo "Runtime client config function is missing"; exit 1; }
          ! grep -R "TURNSTILE_SECRET_KEY" dist/public/assets/*.js >/dev/null || { echo "Secret env name leaked into client bundle"; exit 1; }
      - name: Deploy Pages site and Functions
        run: npx wrangler pages deploy dist/public --project-name=mehyar-web --branch=main
      - name: Verify production runtime client config
        run: |
          CONFIG_JSON="$(curl -fsS https://mehyar.us/api/client-config)"
          echo "$CONFIG_JSON" | node -e '
            let body = "";
            process.stdin.on("data", chunk => body += chunk);
            process.stdin.on("end", () => {
              const config = JSON.parse(body);
              if (!/^0x[A-Za-z0-9_-]{16,}$/.test(config.turnstileSiteKey || "")) throw new Error("runtime Turnstile site key missing");
              if (/secret|private|token/i.test(JSON.stringify(config))) throw new Error("runtime config exposes a sensitive-looking key");
            });
          '
