name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
      - 'functions/**'
      - 'migrations/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'wrangler.toml'
      - '.github/workflows/deploy-cloudflare-pages.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:intake
      - run: CUSTOM_DOMAIN=true NODE_ENV=production npm run build:client
      - name: Deploy Pages site and Functions
        uses: cloudflare/wrangler-action@v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/public --project-name=mehyar-web --branch=main
