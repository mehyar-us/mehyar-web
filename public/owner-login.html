<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Owner Login | MehyarSoft</title>
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#0b0f1a;color:#e5e7eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:32px;max-width:420px;width:100%;box-shadow:0 8px 28px rgba(0,0,0,.4)}
    h1{font-size:22px;font-weight:600;color:#f3f4f6;margin-bottom:8px}
    p.sub{color:#9ca3af;font-size:14px;margin-bottom:24px}
    label{display:block;font-size:13px;color:#d1d5db;margin-bottom:6px;font-weight:500}
    input{width:100%;padding:10px 12px;background:#1f2937;border:1px solid #374151;border-radius:8px;color:#f3f4f6;font-size:14px;outline:none;transition:border-color .15s}
    input:focus{border-color:#60a5fa}
    input:disabled{opacity:.5;cursor:not-allowed}
    .field{margin-bottom:16px}
    button{width:100%;padding:12px;background:#2563eb;border:none;color:#fff;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:8px}
    button:hover:not(:disabled){background:#1d4ed8}
    button:disabled{opacity:.5;cursor:not-allowed}
    .err{background:#7f1d1d;border:1px solid #991b1b;color:#fee2e2;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
    .err.show{display:block}
    .err code{background:#450a0a;padding:1px 6px;border-radius:4px;font-family:monospace;font-size:12px}
    .diag{font-family:monospace;font-size:11px;color:#6b7280;margin-top:16px;padding-top:16px;border-top:1px solid #1f2937;line-height:1.5;word-break:break-all}
    .diag .ok{color:#34d399}
    .diag .bad{color:#f87171}
    a.back{color:#9ca3af;font-size:12px;text-decoration:none;display:inline-block;margin-top:16px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Owner Login</h1>
    <p class="sub">Self-contained sign-in. Does not depend on the service worker or the SPA bundle.</p>
    <div class="err" id="err"></div>
    <form id="f">
      <div class="field">
        <label for="u">Username</label>
        <input id="u" name="u" type="text" autocomplete="username" value="mehyar500" required />
      </div>
      <div class="field">
        <label for="p">Password</label>
        <input id="p" name="p" type="password" autocomplete="current-password" required />
      </div>
      <button type="submit" id="btn">Sign in</button>
    </form>
    <div class="diag" id="diag">…</div>
    <a class="back" href="https://mehyar.us/admin">← back to admin</a>
  </div>
<script>
(()=>{
  const $u=document.getElementById('u'),$p=document.getElementById('p'),$f=document.getElementById('f'),
        $btn=document.getElementById('btn'),$err=document.getElementById('err'),$diag=document.getElementById('diag');
  // Best-practice SW unregister
  if (navigator.serviceWorker) {
    navigator.serviceWorker.getRegistrations().then(rs=>{
      for (const r of rs) r.unregister();
    }).catch(()=>{});
  }
  function showErr(msg){$err.textContent=msg;$err.classList.add('show')}
  function log(msg,ok){const span=document.createElement('div');span.innerHTML=(ok==null?'':('<span class="'+(ok?'ok':'bad')+'">'+(ok?'✓':'✗')+'</span> '))+msg;$diag.appendChild(span)}
  $diag.innerHTML='';
  log('window.location.origin = '+location.origin);
  // Probe the API first to surface network errors clearly
  (async()=>{
    try {
      const probe = await fetch('https://api.mehyar.us/v1/admin/login',{method:'POST',mode:'cors',headers:{'content-type':'application/json'},body:'{}'});
      log('probe POST to api.mehyar.us: '+probe.status+' (any status = network OK)',true);
    } catch(e){
      log('probe FAILED: '+(e&&e.message?e.message:e),false);
      showErr('Network probe failed: '+e.message+'. The browser cannot reach api.mehyar.us. Try disabling VPN/extensions/anti-virus, or try a different network.');
      $btn.disabled=true;
      return;
    }
  })();

  $f.addEventListener('submit', async ev=>{
    ev.preventDefault();
    $err.classList.remove('show');
    $btn.disabled=true; $btn.textContent='Signing in…';
    const username=$u.value.trim(), password=$p.value;
    try {
      const r = await fetch('https://api.mehyar.us/v1/admin/login',{
        method:'POST',
        mode:'cors',
        credentials:'omit',
        headers:{'content-type':'application/json'},
        body: JSON.stringify({username,password}),
      });
      log('POST /v1/admin/login: HTTP '+r.status);
      if (!r.ok) {
        let msg='HTTP '+r.status;
        try{const j=await r.json();msg+=': '+(j.error||j.message||JSON.stringify(j))}catch{}
        showErr(msg);
        $btn.disabled=false;$btn.textContent='Sign in';
        return;
      }
      const j = await r.json();
      if (!j.token) { showErr('No token in response'); $btn.disabled=false;$btn.textContent='Sign in'; return; }
      sessionStorage.setItem('mehyarsoft_admin_token', j.token);
      if (j.expires_in_seconds) {
        sessionStorage.setItem('mehyarsoft_admin_expires_in', String(Date.now() + j.expires_in_seconds*1000));
      }
      log('token issued, length='+j.token.length,true);
      $btn.textContent='Redirecting…';
      // Use a fresh hard navigation so the SPA re-mounts with the new token
      setTimeout(()=>{window.location.href='/admin';}, 400);
    } catch(e){
      log('CAUGHT: '+(e&&e.message?e.message:e),false);
      showErr('Fetch failed: '+(e&&e.message?e.message:e)+'. This is a browser-side network error — the request never reached the server. Try: incognito mode, no extensions, no VPN, clear site data.');
      $btn.disabled=false;$btn.textContent='Sign in';
    }
  });
})();
</script>
</body>
</html>
