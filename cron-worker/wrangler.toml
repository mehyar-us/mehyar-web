name = "mehyar-cron-orchestrator"
main = "src/index.js"
compatibility_date = "2026-05-11"

# ── CF-native cron triggers ──────────────────────────────────────────────
# This is the ONLY execution path for the Mayor engine in production.
#
# Four times per day, all UTC (CF cron ignores local timezones):
#   12:00 UTC  ≈  8 AM ET   →  discover + outreach (full morning loop)
#   14:00 UTC  ≈ 10 AM ET   →  outreach only (catch-up for new prospects)
#   19:00 UTC  ≈  3 PM ET   →  followup (3-step bump sequence)
#   23:00 UTC  ≈  7 PM ET   →  digest + weekly summary (Mon only fires weekly)
#
# Stage partitions look like this so discover fires once and stays current
# with the latest 90-day SAM.gov ingest window.
#
# DST: cron runs at fixed UTC times. Wall-clock shifts 1h forward in summer
# (8 AM ET → 9 AM ET) but the cadence is preserved.
[[triggers]]
crons = ["0 12 * * *", "0 14 * * *", "0 19 * * *", "0 23 * * *"]

# ── Variables (CF Pages-aligned) ─────────────────────────────────────────
# PAGES_ORIGIN: base URL of the Pages project. Defaults to mehyar.us.
# Override for staging by setting via `wrangler secret put` or wrangler.toml.
[vars]
PAGES_ORIGIN = "https://mehyar.us"
# Maps a cron window to a job. The cron worker reads the CURRENT hour and
# routes the POST accordingly. See src/index.js for the routing logic.
# Window 1 (8 AM ET): discover + outreach
# Window 2 (10 AM ET): outreach only
# Window 3 (3 PM ET): followup only
# Window 4 (7 PM ET): digest (Mon weekly adds more)
